<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Reutilizável</title>
    <style>
        .carousel {
            width: 300px;
            overflow: hidden;
            margin: 20px auto;
            position: relative;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-item {
            min-width: 100%;
            box-sizing: border-box;
        }

        .carousel-item img {
            width: 100%;
            display: block;
        }

        .carousel-buttons {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }

        .carousel-buttons button {
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .carousel-buttons button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <!-- Carrossel 1 -->
    <div class="carousel" data-carousel>
        <div class="carousel-track">
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=Image+1" alt="Image 1"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=Image+2" alt="Image 2"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=Image+3" alt="Image 3"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=Image+4" alt="Image 4"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=Image+5" alt="Image 5"></div>
        </div>
        <div class="carousel-buttons">
            <button data-carousel-button="prev">‹</button>
            <button data-carousel-button="next">›</button>
        </div>
    </div>

    <!-- Carrossel 2 -->
    <div class="carousel" data-carousel>
        <div class="carousel-track">
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=A" alt="A"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=B" alt="B"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=C" alt="C"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=D" alt="D"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=E" alt="E"></div>
        </div>
        <div class="carousel-buttons">
            <button data-carousel-button="prev">‹</button>
            <button data-carousel-button="next">›</button>
        </div>
    </div>

    <!-- Carrossel 3 -->
    <div class="carousel" data-carousel>
        <div class="carousel-track">
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=1" alt="1"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=2" alt="2"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=3" alt="3"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=4" alt="4"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/300x150?text=5" alt="5"></div>
        </div>
        <div class="carousel-buttons">
            <button data-carousel-button="prev">‹</button>
            <button data-carousel-button="next">›</button>
        </div>
    </div>

    <script>
        const carousels = document.querySelectorAll("[data-carousel]");

        carousels.forEach(carousel => {
            const track = carousel.querySelector(".carousel-track");
            const items = Array.from(track.children);
            const prevButton = carousel.querySelector("[data-carousel-button='prev']");
            const nextButton = carousel.querySelector("[data-carousel-button='next']");
            let currentIndex = 0;

            const updateCarousel = () => {
                const slideWidth = items[0].getBoundingClientRect().width;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            };

            prevButton.addEventListener("click", () => {
                currentIndex = (currentIndex === 0) ? items.length - 1 : currentIndex - 1;
                updateCarousel();
            });

            nextButton.addEventListener("click", () => {
                currentIndex = (currentIndex === items.length - 1) ? 0 : currentIndex + 1;
                updateCarousel();
            });

            window.addEventListener("resize", updateCarousel);
        });
    </script>
</body>
</html>
